<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>방향 자물쇠 - 성경구절 방탈출</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="card" id="puzzle-card">
  <h1 id="stage-title">자물쇠</h1>
  <p class="subtitle" id="stage-subtitle">힌트가 가리키는 성경구절을 입력하세요</p>

  <form id="verse-form">
    <input
      type="text"
      id="verse-input"
      placeholder="예: 요한복음 3:16"
      autocomplete="off"
      autocapitalize="off"
      autocorrect="off"
    />
    <button type="submit" id="submit-btn">확인</button>
  </form>

  <p class="message" id="message"></p>

  <div id="arrow-stage" hidden></div>
  <div id="arrow-sequence"></div>

  <button id="replay-btn" hidden>화살표 다시보기</button>

  <p class="hint" id="stage-hint">공백이나 띄어쓰기는 신경 쓰지 않아도 됩니다</p>
</div>

<div class="card" id="not-found" hidden>
  <h1>스테이지를 찾을 수 없습니다</h1>
  <p class="subtitle">QR 코드를 다시 스캔해주세요.</p>
</div>

<script src="js/config.js"></script>
<script src="js/sound.js"></script>
<script src="js/app.js"></script>
</body>
</html>
