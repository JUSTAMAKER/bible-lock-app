<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QR 코드 생성 (관리자용)</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="card">
  <h1>스테이지 QR 코드</h1>
  <p class="subtitle">인쇄해서 각 방/자물쇠 옆에 붙여두세요</p>
  <div class="stage-list" id="stage-list"></div>
</div>

<script src="js/config.js"></script>
<script>
  const listEl = document.getElementById("stage-list");
  const siteRoot = window.location.origin + window.location.pathname.replace("admin.html", "");

  const EXTRA_PAGES = [
    { title: "떡 조각 복원 퍼즐 (최후의 만찬)", path: "bread-puzzle.html" },
  ];

  function addQRItem(title, url) {
    const qrImgSrc = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(url)}`;
    const item = document.createElement("div");
    item.className = "stage-item";
    item.innerHTML = `
      <h2>${title}</h2>
      <img src="${qrImgSrc}" alt="QR code for ${title}" width="220" height="220" />
      <div class="url">${url}</div>
    `;
    listEl.appendChild(item);
  }

  Object.entries(STAGES).forEach(([id, stage]) => {
    if (stage.skipVerseApp) return;
    const url = `${siteRoot}index.html?stage=${encodeURIComponent(id)}`;
    addQRItem(`${stage.title} (stage=${id})`, url);
  });

  Object.entries(STAGES).forEach(([id, stage]) => {
    const url = `${siteRoot}direction-lock.html?stage=${encodeURIComponent(id)}`;
    addQRItem(`${stage.title} - 방향 입력형 자물쇠 (stage=${id})`, url);
  });

  EXTRA_PAGES.forEach(({ title, path }) => {
    addQRItem(title, `${siteRoot}${path}`);
  });
</script>
</body>
</html>
