<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>방향 자물쇠 열기</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/lock-widget.css" />
</head>
<body>

<div class="card" id="lock-card">
  <h1 id="stage-title">자물쇠</h1>
  <p class="subtitle">알아낸 방향을 순서대로 눌러 자물쇠를 여세요</p>

  <div class="lock-wrap" id="lock-wrap">
    <svg class="shackle" viewBox="0 0 140 110" xmlns="http://www.w3.org/2000/svg">
      <path
        d="M25,108 L25,55 A45,45 0 0 1 115,55 L115,108"
        fill="none"
        stroke="url(#shackleGradient)"
        stroke-width="18"
        stroke-linecap="round"
      />
      <defs>
        <linearGradient id="shackleGradient" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#d8dde6" />
          <stop offset="45%" stop-color="#f4f7fb" />
          <stop offset="55%" stop-color="#aab1bd" />
          <stop offset="100%" stop-color="#e3e7ee" />
        </linearGradient>
      </defs>
    </svg>
    <div class="lock-body">
      <div class="dial-center"></div>
      <button class="dir-btn dir-up" data-dir="up" aria-label="위">▲</button>
      <button class="dir-btn dir-left" data-dir="left" aria-label="왼쪽">◀</button>
      <button class="dir-btn dir-right" data-dir="right" aria-label="오른쪽">▶</button>
      <button class="dir-btn dir-down" data-dir="down" aria-label="아래">▼</button>
    </div>
  </div>

  <div class="pips" id="pips"></div>

  <p class="message" id="message"></p>

  <p class="hint">방향 버튼을 눌러 정답 순서를 입력하세요. 틀리면 처음부터 다시 입력합니다.</p>
</div>

<div class="card" id="not-found" hidden>
  <h1>스테이지를 찾을 수 없습니다</h1>
  <p class="subtitle">QR 코드를 다시 스캔해주세요.</p>
</div>

<script src="js/config.js"></script>
<script src="js/sound.js"></script>
<script src="js/direction-lock.js"></script>
</body>
</html>
